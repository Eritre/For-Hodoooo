<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Farooha ❤️</title>

<style>
body{
margin:0;
font-family:'Comic Sans MS', cursive;
text-align:center;
background:linear-gradient(135deg,#ffb6c1,#ffc0cb,#ffe4e1);
overflow:hidden;
color:#333;
}

.screen{display:none;margin-top:70px;}
.active{display:block;}

h1{font-size:32px;}

button{
padding:14px 22px;
font-size:18px;
border:none;
border-radius:20px;
margin:10px;
cursor:pointer;
background:#ff4d6d;
color:white;
}

input{
padding:12px;
border-radius:10px;
border:none;
font-size:16px;
}

img,video{
width:250px;
border-radius:20px;
margin-top:10px;
}

.caption{color:#555;font-size:18px;}

.love-text{font-size:22px;margin:6px;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="screen active">
<h1>Only you can unlock this ❤️</h1>
<p>What's my favorite nickname for you?</p>
<input id="pass">
<br>
<button onclick="checkPass()">Enter ❤️</button>
</div>

<!-- STORY -->
<div id="story" class="screen">
<h1 id="name"></h1>
<p id="storyText"></p>
</div>

<!-- LOADING -->
<div id="loading" class="screen">
<h1>Thinking about you… 😌</h1>
<p id="loadingText"></p>
</div>

<!-- GALLERY -->
<div id="gallery" class="screen">
<h1>Our Memories ❤️</h1>
<div id="media"></div>
<p id="caption"></p>
<button onclick="nextMedia()">Next ➜</button>
</div>

<!-- VOICE -->
<div id="voice" class="screen">
<h1>Voice Messages 🎧</h1>
<audio controls src="voice1.mp3"></audio><br>
<audio controls src="voice2.mp3"></audio><br><br>
<button onclick="finalScreen()">Continue ❤️</button>
</div>

<!-- FINAL -->
<div id="final" class="screen">
<h1>❤️</h1>

<div class="love-text">I LOVE YOU 🇬🇧</div>
<div class="love-text">أحبك 🇸🇦</div>
<div class="love-text">ኣፍቅረኪ 🇪🇷</div>
<div class="love-text">Te amo 🇪🇸</div>
<div class="love-text">Waan ku jeclahay 🇸🇴</div>

<br>

<img src="somaliland.png" width="80">
<img src="eritrea.png" width="80">

<p style="font-size:20px;">
THIS IS A FOREVER THING ❤️
</p>
</div>

<!-- MUSIC -->
<audio id="music" src="music.mp3" loop></audio>

<script>

/* MUSIC (starts after click) */
document.addEventListener("click",()=>{
document.getElementById("music").play();
},{once:true});

function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* PASSWORD */
function checkPass(){
let v=document.getElementById("pass").value.toLowerCase().trim();
if(v==="farooha"){
startStory();
}else{
alert("Try again 😒");
}
}

/* STORY */
function startStory(){
show("story");

let n=document.getElementById("name");
let t=document.getElementById("storyText");

type("Farax Mohammed Handule ❤️",n,()=>{
type("Farooha ❤️",n,()=>{
type("I'm thinking about you…",t,()=>{
type("It has been the best 1 year and 2 months ❤️",t,()=>{
type("You make life soft, beautiful and peaceful 💖",t,()=>{
setTimeout(()=>{
show("loading");
loading();
},1500);
});
});
});
});
});
}

/* TYPE */
function type(txt,el,cb){
let i=0;
el.textContent="";
let x=setInterval(()=>{
el.textContent+=txt[i];
i++;
if(i>=txt.length){
clearInterval(x);
if(cb) cb();
}
},50);
}

/* LOADING */
function loading(){
let el=document.getElementById("loadingText");

let m=[
{t:"Thinking about you...",d:2000},
{t:"1 year and 2 months feels like home 💖",d:10000},
{t:"Almost ready...",d:2000}
];

let i=0;
function next(){
if(i<m.length){
el.textContent=m[i].t;
setTimeout(()=>{i++;next();},m[i].d);
}else{
show("gallery");
}
}
next();
}

/* GALLERY */
let media=[
{type:"img",src:"photo1.jpeg",cap:"YOU ❤️"},
{type:"img",src:"photo2.jpeg",cap:"US 💖"},
{type:"img",src:"photo3.jpeg",cap:"PERFECT ✨"},
{type:"vid",src:"video1.mp4",cap:"MEMORY 🎥"},
{type:"vid",src:"video2.mp4",cap:"LOVE 🎵"}
];

let i=0;

function nextMedia(){
let m=document.getElementById("media");
let c=document.getElementById("caption");
m.innerHTML="";

let x=media[i];

if(x.type==="img"){
let img=document.createElement("img");
img.src=x.src;
m.appendChild(img);
}else{
let v=document.createElement("video");
v.src=x.src;
v.controls=true;
m.appendChild(v);
}

c.textContent=x.cap;

i++;

if(i>=media.length){
setTimeout(()=>show("voice"),2000);
}
}

/* FINAL SCREEN */
function finalScreen(){
show("final");
}

</script>

</body>
</html>
