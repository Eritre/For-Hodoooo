<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Farooha ❤️</title>

<style>
body {
margin:0;
font-family:'Comic Sans MS', cursive;
text-align:center;
background: linear-gradient(135deg, #ffb6c1, #ffc0cb, #ffe4e1);
overflow:hidden;
color:#333;
}

.screen { display:none; margin-top:70px; }
.active { display:block; }

h1 { font-size:35px; }
p { font-size:18px; }

button {
padding:15px 25px;
font-size:18px;
border:none;
border-radius:20px;
margin:10px;
cursor:pointer;
background:#ff4d6d;
color:white;
}

button:hover { transform:scale(1.05); }

input {
padding:12px;
border-radius:10px;
border:none;
font-size:16px;
}

img, video {
width:260px;
border-radius:20px;
margin-top:10px;
}

.heart {
position:absolute;
animation:float 5s linear infinite;
}

@keyframes float {
from {transform:translateY(100vh);}
to {transform:translateY(-10vh);}
}

.caption {
font-size:18px;
margin-top:10px;
color:#555;
}

.love-text {
font-size:22px;
margin:8px 0;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="screen active">
<h1>Only you can unlock this 😏</h1>
<p>What's my favorite nickname for you?</p>
<input type="text" id="pass">
<br><br>
<button onclick="checkPass()">Enter ❤️</button>
</div>

<!-- STORY -->
<div id="story" class="screen">
<h1 id="name"></h1>
<p id="storyText"></p>
</div>

<!-- LOADING -->
<div id="loading" class="screen">
<h1>Thinking about you… 😌</h1>
<p id="loadingText"></p>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
<h1>Be honest 😏</h1>
<p id="question"></p>
<button onclick="nextQ()">Yes 💖</button>
<button onclick="nextQ()">Of course 😌</button>
</div>

<!-- FINAL QUESTION -->
<div id="finalQ" class="screen">
<h1>DO YOU LOVE ME?</h1>
<button onclick="love()">A LOT 💖</button>
<button onclick="love()">SUPER A LOT 😍</button>
</div>

<!-- GALLERY -->
<div id="gallery" class="screen">
<h1>Our little memories ❤️</h1>
<div id="mediaContainer"></div>
<p id="caption" class="caption"></p>
<button onclick="nextPhoto()">Next ➜</button>
</div>

<!-- FINAL -->
<div id="final" class="screen">
<h1>❤️</h1>

<div class="love-text">I LOVE YOU 🇬🇧</div>
<div class="love-text">أحبك 🇸🇦</div>
<div class="love-text">ኣፍቅረኪ 🇪🇷</div>
<div class="love-text">Te amo 🇪🇸</div>
<div class="love-text">Waan ku jeclahay 🇸🇴</div>

<br>

<img src="somaliland.png" width="80">

<p style="font-size:22px;">
THIS IS A FOREVER THING.<br>
I AM GLAD YOU ARE ON BOARD ❤️
</p>
</div>

<!-- 🎵 MUSIC -->
<audio id="music" src="music.mp3" loop></audio>

<script>

/* 🔊 MUSIC START (works after first click) */
document.addEventListener("click", function(){
document.getElementById("music").play();
}, { once:true });

/* SCREEN SWITCH */
function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* PASSWORD */
function checkPass(){
let val = document.getElementById("pass").value.toLowerCase().trim();
if(val === "farooha"){
startStory();
} else {
alert("Try again 😒");
}
}

/* TYPE TEXT */
function typeText(el, text, speed, cb){
let i=0;
el.textContent="";
let inter=setInterval(()=>{
el.textContent+=text.charAt(i);
i++;
if(i>=text.length){
clearInterval(inter);
if(cb) setTimeout(cb,800);
}
},speed);
}

/* STORY */
function startStory(){
show("story");

let name=document.getElementById("name");
let text=document.getElementById("storyText");

typeText(name,"Farooha ❤️",80,()=>{
text.textContent="I made this for you… just follow it 😌";

setTimeout(()=>{
show("loading");
fakeLoading();
},2000);
});
}

/* LOADING */
function fakeLoading(){
let el=document.getElementById("loadingText");

let data=[
{text:"Thinking about you...", time:2000},
{text:"It has been an amazing 1 year and 2 months... You make life soft, peaceful and worth living 💚", time:10000},
{text:"Almost ready...", time:2000}
];

let i=0;

function next(){
if(i<data.length){
el.textContent=data[i].text;
setTimeout(()=>{ i++; next(); }, data[i].time);
} else {
show("quiz");
askQ();
}
}

next();
}

/* QUIZ */
let questions=[
"Do you miss me?",
"Am I your favorite person?",
"Do you smile when you see my name?"
];

let q=0;

function askQ(){
document.getElementById("question").textContent=questions[q];
}

function nextQ(){
q++;
if(q<questions.length){
askQ();
}else{
show("finalQ");
}
}

/* LOVE */
function love(){
for(let i=0;i<50;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),5000);
}

setTimeout(()=>showGallery(),1200);
}

/* GALLERY */
let media=[
{type:"image", src:"photo1.jpeg", caption:"YOU & ME ❤️"},
{type:"image", src:"photo2.jpeg", caption:"Your smile 😍"},
{type:"image", src:"photo3.jpeg", caption:"Perfect ✨"},
{type:"video", src:"video1.mp4", caption:"Memories 💚"},
{type:"video", src:"video2.mp4", caption:"More moments 🎵"}
];

let index=0;

function showGallery(){
show("gallery");
index=0;
updatePhoto();
}

function updatePhoto(){
let c=document.getElementById("mediaContainer");
c.innerHTML="";

let cur=media[index];

if(cur.type==="image"){
let img=document.createElement("img");
img.src=cur.src;
c.appendChild(img);
}else{
let vid=document.createElement("video");
vid.src=cur.src;
vid.controls=true;
c.appendChild(vid);
}

document.getElementById("caption").textContent=cur.caption;
}

function nextPhoto(){
index++;
if(index<media.length){
updatePhoto();
}else{
show("final");
}
}

</script>

</body>
</html>
