<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Farooha ❤️</title>

<style>
body {
margin:0;
font-family:'Comic Sans MS', cursive;
text-align:center;
background: linear-gradient(135deg, #ffb6c1, #ffc0cb, #ffe4e1);
overflow:hidden;
color:#333;
}

.screen { display:none; margin-top:70px; }
.active { display:block; }

h1 { font-size:35px; }

p { font-size:18px; }

button {
padding:15px 25px;
font-size:18px;
border:none;
border-radius:20px;
margin:10px;
cursor:pointer;
background:#ff4d6d;
color:white;
}

button:hover {
transform:scale(1.05);
}

input {
padding:12px;
border-radius:10px;
border:none;
font-size:16px;
}

img {
width:260px;
border-radius:20px;
margin-top:10px;
}

/* fade animation */
.fade {
animation: fadeIn 2s ease-in-out;
}

@keyframes fadeIn {
from {opacity:0;}
to {opacity:1;}
}

/* hearts */
.heart {
position:absolute;
animation:float 5s linear infinite;
}

@keyframes float {
from {transform:translateY(100vh);}
to {transform:translateY(-10vh);}
}

/* caption */
.caption {
font-size:18px;
margin-top:10px;
color:#555;
}
</style>
</head>

<body>

<!-- PASSWORD -->
<div id="login" class="screen active">
<h1>Only you can unlock this 😏</h1>
<p>What’s my favorite nickname for you?</p>
<input type="text" id="pass" placeholder="type it here 👀">
<br><br>
<button onclick="checkPass()">Enter ❤️</button>
</div>

<!-- STORY NAME -->
<div id="story" class="screen">
<h1 id="name"></h1>
<p id="storyText"></p>
</div>

<!-- LOADING -->
<div id="loading" class="screen">
<h1>Thinking about you… 😌</h1>
<p id="loadingText"></p>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
<h1>Be honest 😏</h1>
<p id="question"></p>
<button onclick="nextQ()">Yes 💖</button>
<button onclick="nextQ()">Of course 😌</button>
</div>

<!-- FINAL QUESTION -->
<div id="finalQ" class="screen">
<h1>DO YOU LOVE ME?</h1>
<button onclick="love()">A LOT 💖</button>
<button onclick="love()">SUPER A LOT 😍</button>
</div>

<!-- SLIDESHOW -->
<div id="gallery" class="screen">
<h1>Our little memories ❤️</h1>

<img id="photo" src="photo1.jpg">
<p id="caption" class="caption"></p>

<button onclick="nextPhoto()">Next ➜</button>
</div>

<!-- VOICE GATE -->
<div id="voiceGate" class="screen">
<h1>Before you continue… 🎤</h1>
<p>Listen to this first ❤️</p>
<button onclick="playVoiceAndContinue()">▶️ Play</button>
</div>

<!-- FINAL MESSAGE -->
<div id="final" class="screen">
<h1>💌</h1>
<p style="font-size:22px;">
THIS IS A FOREVER THING.<br>
I AM GLAD YOU ARE ON BOARD ❤️
</p>
</div>

<!-- MUSIC -->
<iframe width="0" height="0"
src="https://www.youtube.com/embed/YOUR_VIDEO_ID?autoplay=1&loop=1&playlist=YOUR_VIDEO_ID"
frameborder="0"></iframe>

<script>

/* PASSWORD */
function checkPass(){
let val=document.getElementById("pass").value.toLowerCase().trim();
if(val==="farooha"){
startStory();
} else {
alert("Try again 😒");
}
}

/* SCREEN SWITCH */
function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* TYPE NAME */
function typeText(el, text, speed, cb){
let i=0;
el.innerHTML="";
let inter=setInterval(()=>{
el.innerHTML+=text.charAt(i);
i++;
if(i>=text.length){
clearInterval(inter);
if(cb) setTimeout(cb,800);
}
},speed);
}

/* STORY */
function startStory(){
show("story");

let name=document.getElementById("name");
let text=document.getElementById("storyText");

typeText(name,"Farax Mohammed Abdulrahman Hadule...",50,()=>{
typeText(name,"Gerxaches...",60,()=>{
typeText(name,"Farooha ❤️",80,()=>{
text.innerHTML="I made this for you… just follow it 😌";

setTimeout(()=>{
show("loading");
fakeLoading();
},2000);
});
});
});
}

/* LOADING */
let msgs=[
"Thinking about you...",
"You make everything softer...",
"Almost ready..."
];

function fakeLoading(){
let i=0;
let inter=setInterval(()=>{
document.getElementById("loadingText").innerText=msgs[i];
i++;
if(i>=msgs.length){
clearInterval(inter);
show("quiz");
askQ();
}
},1500);
}

/* QUESTIONS */
let questions=[
"Do you miss me?",
"Am I your favorite person?",
"Do you smile when you see my name?"
];

let q=0;

function askQ(){
document.getElementById("question").innerText=questions[q];
}

function nextQ(){
q++;
if(q<questions.length){
askQ();
} else {
show("finalQ");
}
}

/* LOVE */
function love(){
for(let i=0;i<70;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),5000);
}

setTimeout(()=>showGallery(),1200);
}

/* SLIDESHOW */
let photos=["photo1.jpg","your-photo.jpg","photo2.jpg"];
let captions=["YOU & ME ❤️","Prettiest eyes in Somaliland 😍","ETHEREAL ✨"];
let index=0;

function showGallery(){
show("gallery");
index=0;
updatePhoto();
}

function updatePhoto(){
document.getElementById("photo").src=photos[index];
document.getElementById("caption").innerText=captions[index];
}

function nextPhoto(){
index++;
if(index<photos.length){
updatePhoto();
} else {
show("voiceGate");
}
}

/* VOICE */
function playVoiceAndContinue(){
let audio=new Audio("voice1.mp3");
audio.play();

audio.onended=function(){
show("final");
};
}

</script>

</body>
</html>
